<!DOCTYPE html>
<html>
<head>
  <title>HTML Form Test</title>
</head>
<body>
<center>

  <div style="border: 1px solid black; width: 500px; padding: 10px;">

    <form action="" method="post">

      <table width="100%" cellpadding="8">

        <tr>
          <td colspan="2"><strong>HTML Form Test</strong></td>
        </tr>

        <tr>
          <td>Name</td>
          <td><input type="text" name="name" size="30"></td>
        </tr>

        <tr>
          <td>Address</td>
          <td><input type="text" name="address" size="30"></td>
        </tr>
        <tr>
          <td>Email</td>
          <td><input type="text" name="email" size="30"></td>
        </tr>

        <tr>
          <td>Gender</td>
          <td>
            <input type="radio" name="gender" value="male"> Male
            &nbsp;
            <input type="radio" name="gender" value="female"> Female
          </td>
        </tr>

        <tr>
          <td>Hobbies</td>
          <td>
            <input type="checkbox" name="hobbies" value="sports"> Sports
            &nbsp;
            <input type="checkbox" name="hobbies" value="movies"> Movies
            &nbsp;
            <input type="checkbox" name="hobbies" value="travelling"> Travelling
          </td>
        </tr>

        <tr>
          <td>Country</td>
          <td>
            <select name="country">
              <option value="nepal">Nepal</option>
              <option value="india">India</option>
              <option value="usa">USA</option>
              <option value="uk">UK</option>
            </select>
          </td>
        </tr>

        <tr>
          <td>Message</td>
          <td>
            <textarea name="message" rows="8" cols="40"></textarea>
          </td>
        </tr>

        <tr>
          <td></td>
          <td>
            <input type="submit" value="Submit">
            &nbsp;
            <input type="reset" value="Reset">
          </td>
        </tr>

      </table>

    </form>

  </div>

</center>
</body>
</html>
